# Tiny Tapeout project information
project:
  title: "AI Neural Signal Filter"
  author: "Soumobrata Ghosh"
  discord: ""
  description: "Sequential fixed-point neural network for signal filtering and 3-class classification"
  language: "Verilog"
  clock_hz: 25000000

  tiles: "8x2"

  top_module: "tt_um_sfg_ai_filter"

  source_files:
    - "project.v"
    - "ai_filter.v"

pinout:
  # Inputs
  ui[0]: "in_valid"
  ui[1]: "in_last"
  ui[2]: "sample_bit10"
  ui[3]: "sample_bit11"
  ui[4]: "sample_bit12"
  ui[5]: "sample_bit13"
  ui[6]: "sample_bit14"
  ui[7]: "sample_bit15"

  # Outputs
  uo[0]: "clean_bit"
  uo[1]: "clean_valid"
  uo[2]: "class_idx0"
  uo[3]: "class_idx1"
  uo[4]: "class_valid"
  uo[5]: "fc1_valid"
  uo[6]: "fc2_valid"
  uo[7]: "argmax_valid"

  # Bidirectional pins
  uio[0]: "sample_bit0"
  uio[1]: "sample_bit1"
  uio[2]: "sample_bit2"
  uio[3]: "sample_bit3"
  uio[4]: "sample_bit4"
  uio[5]: "sample_bit5"
  uio[6]: "sample_bit6"
  uio[7]: "sample_bit7"

yaml_version: 6
